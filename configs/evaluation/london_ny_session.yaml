# Evaluation config: filtrat STRICT pe sesiunile London + NY Killzone
# 
# Ipoteza testata: Modelul antrenat EXCLUSIV pe barele London/NY va avea
# un IC_median mai mare decat modelul antrenat pe toate barele (baseline: 0.0233).
#
# HOW IT WORKS (Ordinea Corecta):
#   1. Feature-urile se calculeaza pe TOATA seria (continuitate pastrata)
#   2. Dupa feature computation, filtram DOAR barele din sesiunile active
#   3. Walk-Forward ruleaza pe aceste bare filtrate
#
# Aceasta ordine garanteaza ca rolling windows (momentum_4h, atr_14)
# sunt calculate corect, fara gaps artificiale.

H: 4                    # Forecast horizon: 4 x 5min = 20 minute
input_size: 96          # Lookback: 96 x 5min = 8h context
test_size: 0.2
n_folds: 6

# Trading simulation
spread_pips: 1.5
pip_value: 0.0001

# Session filter: SSOT pentru filtrarea sesiunilor
# Barele cu oricare dintre aceste coloane == 1 vor fi PASTRATE pentru antrenare.
# Restul (Asian, Off-Hours) sunt excluse DUPA calculul features.
session_filter:
  - is_london_kz
  - is_ny_kz
